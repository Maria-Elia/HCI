CRISPR is a gene-editing technology that allows scientists to modify DNA. It uses a molecule called guide RNA, which identifies a specific DNA sequence that scientists want to change.

An enzyme called Cas9 follows the guide RNA to the target location and cuts the DNA. After the DNA is cut, the cell naturally repairs the break. Scientists can use this repair process to remove, replace, or insert genetic material.
